<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Login — Joe Medical Center</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body{
        background-color: var(--dark-bg);
        min-height: 100vh;
    }
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--dark-bg);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      box-shadow: var(--shadow-xl);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .login-header h2 {
      font-size: 1.8rem;
      margin-bottom: var(--spacing-md);
    }

    .login-header p {
      color: var(--muted-text); 
      font-size: 14px;
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--spacing-sm);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted-text);
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-md);
      color: var(--light-text);
      font-size: 14px;
      transition: var(--transition);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
      letter-spacing: 0.5px;
    }

    .login-button:hover {
      transform: translateY(-2px);
    }

    .login-footer {
      text-align: center;
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--dark-border);
    }

    .error-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      color: var(--danger);
      margin-bottom: var(--spacing-lg);
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      color: var(--muted-text);
      text-decoration: none;
      font-size: 13px;
      transition: var(--transition);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h2><span style="color: var(--primary);">Patient</span> <span style="color: var(--success);">Login</span></h2>
        <p>Access your appointments and health records</p>
      </div>

      <div id="error-message" class="error-alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email"
            name="email" 
            placeholder="your@email.com" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password"
            name="password" 
            placeholder="Enter your password" 
            required
          >
        </div>

        <button type="submit" class="login-button">Sign In</button>
      </form>

      <div class="login-footer">
        <p>Don't have an account? <a href="/pat/reg.html" style="color: var(--primary);">Create New Account</a></p>
        <a href="/" class="back-link">← Back to Home</a>
      </div>
    </div>
  </div>

  <script type="module">
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.style.display = 'none';

      const email = form.email.value;
      const password = form.password.value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // Store user info (simplified session)
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/pat/dashboard.html';
        } else {
          errorDiv.textContent = data.message || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
